<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premier League Player Statistics by Nation">
    <title>프리미어 리그 통계실</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-decor blur-circle-1"></div>
    <div class="background-decor blur-circle-2"></div>

    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-futbol"></i> PL 기록실
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="선수 이름으로 검색...">
            <button id="searchBtn"><i class="fa-solid fa-search"></i></button>
        </div>
        <nav class="nav-links">
            <a href="#" class="active">홈</a>
            <a href="#">순위표</a>
            <a href="#">커뮤니티</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero-section">
            <div class="hero-content">
                <h1>엘리트 선수들의 <span class="highlight">성과 분석</span></h1>
                <p>프리미어 리그에서 뛰는 핵심 선수들의 국가별 현황과 전적을 탐색해 보세요. 생생한 기록들을 분석하고 최고의 선수들을 비교할 수 있습니다.</p>
            </div>
            
            <div class="filter-section glass-panel">
                <div class="filter-group">
                    <label for="nationSelect">국가 필터:</label>
                    <select id="nationSelect">
                        <option value="">모든 국가</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="players-section">
            <h2 class="section-title">선수 목록</h2>
            <div id="playersGrid" class="players-grid">
                <!-- Players will be injected here via JS -->
            </div>
        </section>
    </main>

    <!-- Player Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 프리미어 리그 전적 분석 웹앱. 모든 권리 보유.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
